<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Fashion Studio ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6BB5; --purple: #9333EA; --mint: #34D399;
    --yellow: #FBBF24; --text: #3D1A5C; --bg: #FDF4FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fredoka', sans-serif;
    background: var(--bg); min-height: 100vh; overflow-x: hidden;
  }
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== PICK SCREEN ===== */
  #pickScreen {
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
    background: radial-gradient(ellipse at 30% 20%, #FFE4F5 0%, #F3E8FF 50%, #E0F2FE 100%);
  }
  .pick-title {
    font-size: clamp(2.4rem, 7vw, 4.2rem); font-weight: 700;
    color: var(--text); line-height: 1.1; margin-bottom: .3rem;
  }
  .pick-title em { color: var(--pink); font-style: normal; }
  .pick-sub { font-size: 1.25rem; color: var(--purple); margin-bottom: 2.5rem; }
  .pick-cards { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .pick-card {
    background: #fff; border-radius: 28px; padding: 1.4rem;
    box-shadow: 0 8px 32px rgba(147,51,234,.14);
    cursor: pointer; width: 210px; text-align: center;
    border: 3px solid transparent;
    transition: transform .22s, border-color .22s, box-shadow .22s;
    display: flex; flex-direction: column; align-items: center; gap: .9rem;
  }
  .pick-card:hover {
    transform: translateY(-10px) scale(1.04);
    border-color: var(--purple);
    box-shadow: 0 18px 48px rgba(147,51,234,.28);
  }
  .pick-img-wrap {
    width: 150px; height: 210px; border-radius: 18px;
    overflow: hidden; background: #F3E8FF;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .pick-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .pick-placeholder { font-size: 3.5rem; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .pick-card h2 { font-size: 1.5rem; color: var(--text); }

  /* ===== STUDIO SCREEN ===== */
  #studioScreen { background: var(--bg); }
  .studio-header {
    background: linear-gradient(135deg, #7C3AED, #DB2777);
    padding: .85rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 18px rgba(124,58,237,.35); flex-shrink: 0; gap: 1rem;
  }
  .studio-header h1 { color: #fff; font-size: 1.65rem; font-weight: 700; white-space: nowrap; }
  .header-actions { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  .btn-yellow {
    background: var(--yellow); color: var(--text);
    border: none; border-radius: 50px; padding: .5rem 1.4rem;
    font-family: 'Fredoka', sans-serif; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 3px 12px rgba(251,191,36,.4); white-space: nowrap;
  }
  .btn-yellow:hover { transform: scale(1.08); box-shadow: 0 5px 20px rgba(251,191,36,.55); }
  .btn-ghost {
    background: rgba(255,255,255,.2); color: #fff;
    border: 2px solid rgba(255,255,255,.5); border-radius: 50px;
    padding: .45rem 1.1rem;
    font-family: 'Fredoka', sans-serif; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn-ghost:hover { background: rgba(255,255,255,.35); }

  .studio-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* Model area */
  .model-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 1.5rem;
    background: linear-gradient(150deg, #FDF4FF 0%, #EDE9FE 100%);
    position: relative; min-height: 350px;
  }
  .model-frame {
    position: relative; width: 260px; height: 390px;
    border-radius: 22px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(124,58,237,.22);
    background: #fff;
  }
  #modelImg {
    width: 100%; height: 100%; object-fit: contain;
    display: block; transition: opacity .5s;
  }
  .model-overlay {
    position: absolute; inset: 0; border-radius: 22px;
    background: rgba(243,232,255,.9); backdrop-filter: blur(6px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .7rem;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .model-overlay.show { opacity: 1; }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #DDD6FE; border-top-color: var(--purple);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-msg { font-size: 1.05rem; font-weight: 600; color: var(--purple); text-align: center; line-height: 1.4; }
  .model-hint { margin-top: .8rem; font-size: .85rem; color: #9333EA; opacity: .7; }

  /* Category panel */
  .cat-panel {
    width: 295px; background: #fff;
    border-left: 3px solid #EDE9FE;
    overflow-y: auto; padding: .9rem;
    display: flex; flex-direction: column; gap: .5rem;
  }
  .cat-panel::-webkit-scrollbar { width: 6px; }
  .cat-panel::-webkit-scrollbar-thumb { background: #DDD6FE; border-radius: 3px; }

  .cat-row {
    background: #FAFAFE; border-radius: 14px;
    padding: .6rem .85rem; border: 2px solid #EDE9FE;
    transition: border-color .15s;
  }
  .cat-row:hover { border-color: #C4B5FD; }
  .cat-label {
    font-size: .78rem; font-weight: 700; color: #7C3AED;
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: .38rem;
  }
  .cat-controls { display: flex; align-items: center; gap: .45rem; }
  .arr {
    background: var(--purple); color: #fff; border: none;
    border-radius: 50%; width: 30px; height: 30px; flex-shrink: 0;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .14s, transform .1s;
  }
  .arr:hover { background: #6D28D9; transform: scale(1.18); }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    border: 2.5px solid rgba(0,0,0,.14);
    transition: transform .15s;
  }
  .cat-row:hover .swatch { transform: scale(1.15); }
  .opt-name {
    flex: 1; font-size: .95rem; font-weight: 600;
    color: var(--text); text-align: center;
  }

  /* ===== PHOTO SCREEN ===== */
  #photoScreen {
    align-items: center; padding: 1.4rem 1rem; gap: .9rem;
    background: linear-gradient(160deg, #FDF4FF 0%, #EDE9FE 100%);
  }
  #photoScreen h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
  #photoScreen .sub { font-size: 1rem; color: var(--purple); }

  .bg-strip {
    display: flex; gap: .55rem; flex-wrap: wrap;
    justify-content: center; max-width: 520px;
  }
  .bg-btn {
    padding: .38rem .95rem; border-radius: 50px;
    border: 2px solid #DDD6FE; background: #F3E8FF;
    color: #7C3AED; font-family: 'Fredoka', sans-serif;
    font-size: .92rem; font-weight: 600; cursor: pointer;
    transition: all .14s;
  }
  .bg-btn:hover, .bg-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

  .photo-frame {
    position: relative;
    width: min(440px, 92vw);
    height: min(500px, 82vw);
    border-radius: 22px; overflow: hidden;
    box-shadow: 0 12px 52px rgba(124,58,237,.3);
    background: #fff;
  }
  #photoImg {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: opacity .5s;
  }
  .photo-overlay {
    position: absolute; inset: 0;
    background: rgba(243,232,255,.88); backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .8rem;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .photo-overlay.show { opacity: 1; }

  .photo-actions {
    display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center;
  }
  .btn-outline {
    background: #EDE9FE; color: #7C3AED; border: none; border-radius: 50px;
    padding: .55rem 1.5rem; font-family: 'Fredoka', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .15s;
  }
  .btn-outline:hover { background: #DDD6FE; }

  /* Flash / sparkles */
  .flash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 999;
    transition: opacity .12s;
  }
  .flash.go { opacity: 1; }
  @keyframes sparkle {
    0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
    50%{opacity:1;transform:scale(1.2) rotate(200deg)}
  }
  .sp { position:absolute; pointer-events:none; font-size:1.5rem; animation:sparkle .9s ease both; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:660px){
    .studio-body { flex-direction: column; }
    .cat-panel { width: 100%; border-left: none; border-top: 3px solid #EDE9FE; max-height: 44vh; }
    .model-frame { width: 185px; height: 278px; }
    .studio-header h1 { font-size: 1.3rem; }
  }
</style>
</head>

    <button class="btn-yellow" onclick="snap()">📸 Snap It!</button>
    <button class="btn-outline" onclick="restart()">🔄 Start Over</button>

// STATE
// ============================================================
let gender = 'girl';
let outfit = {hair:0, hairItem:0, hat:0, top:0, jewels:0, bottom:0, bag:0, shoes:0};
let debounceTimer = null;
let selectedBg = 0;
let remixCounter = 0;

// ============================================================
// HELPERS
// ============================================================
function opts(key) {
  if (key==='hair')   return gender==='girl' ? D.girlHair   : D.boyHair;
  if (key==='top')    return gender==='girl' ? D.girlTop    : D.boyTop;
  if (key==='bottom') return gender==='girl' ? D.girlBottom : D.boyBottom;
  if (key==='shoes')  return gender==='girl' ? D.girlShoes  : D.boyShoes;
  return D[key] || [];
}

function buildCharPrompt() {
  const g = gender === 'girl' ? 'girl' : 'boy';
  const style = `high quality 2D digital art, traditional hand-drawn animation style, cute expressive chibi ${g} character, exaggerated charming proportions, expressive facial features, dynamic confident pose, full body view, soft global illumination, cinematic rim lighting, subtle fabric textures, hand-painted textures, vibrant colors`;

  const parts = [
    style,
    opts('hair')[outfit.hair].p,
  ];
  const hi = opts('hairItem')[outfit.hairItem].p;
  const hat = opts('hat')[outfit.hat].p;
  if (hi) parts.push(hi + ' in hair');
  if (hat) parts.push('wearing ' + hat);
  parts.push('wearing ' + opts('top')[outfit.top].p);
  parts.push(opts('bottom')[outfit.bottom].p);
  parts.push(opts('shoes')[outfit.shoes].p);
  const bag = opts('bag')[outfit.bag].p;
  const jwl = opts('jewels')[outfit.jewels].p;
  if (bag) parts.push('carrying ' + bag);
  if (jwl) parts.push(jwl);
  parts.push('plain white background, centered, character facing forward');
  return parts.join(', ');
}

function buildPhotoPrompt(bgPrompt) {
  const g = gender === 'girl' ? 'girl' : 'boy';
  const style = `high quality 2D digital art, traditional hand-drawn animation style, cute expressive chibi ${g} character, exaggerated charming proportions, expressive facial features, dynamic joyful pose, full body, soft global illumination, cinematic rim lighting, hand-painted textures`;

  const parts = [style];
  parts.push(opts('hair')[outfit.hair].p);
  const hi = opts('hairItem')[outfit.hairItem].p;
  const hat = opts('hat')[outfit.hat].p;
  if (hi) parts.push(hi + ' in hair');
  if (hat) parts.push('wearing ' + hat);
  parts.push('wearing ' + opts('top')[outfit.top].p);
  parts.push(opts('bottom')[outfit.bottom].p);
  parts.push(opts('shoes')[outfit.shoes].p);
  const bag = opts('bag')[outfit.bag].p;
  const jwl = opts('jewels')[outfit.jewels].p;
  if (bag) parts.push('carrying ' + bag);
  if (jwl) parts.push(jwl);
  parts.push(bgPrompt);
  parts.push('beautiful detailed scene, illustration');
  return parts.join(', ');
}

function getSeed(extra = 0) {
  const vals = Object.values(outfit);
  const base = vals.reduce((a, v, i) => a + v * (i * 13 + 7), gender === 'girl' ? 1234 : 5678);
  return (base + remixCounter * 999 + extra) % 99999;
}

function makeUrl(prompt, w, h, seed) {
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&nologo=true&safe=true&seed=${seed}`;
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(g) {
  gender = g;
  outfit = {hair:0, hairItem:0, hat:0, top:0, jewels:0, bottom:0, bag:0, shoes:0};
  remixCounter = 0;
  buildPanel();
  showScreen('studioScreen');
  loadCharacter();
}

function goPhoto() {
  showScreen('photoScreen');
  buildBgStrip();
  applyBg(0);
}

function goStudio() { showScreen('studioScreen'); }

function restart() {
  outfit = {hair:0, hairItem:0, hat:0, top:0, jewels:0, bottom:0, bag:0, shoes:0};
  showScreen('pickScreen');
}

// ============================================================
// CHARACTER IMAGE
// ============================================================
function loadCharacter(showMsg = '✨ Styling your\nlook...') {
  const overlay = document.getElementById('modelOverlay');
  overlay.querySelector('.overlay-msg').textContent = showMsg;
  overlay.classList.add('show');

  const prompt = buildCharPrompt();
  const seed = getSeed();
  const url = makeUrl(prompt, 400, 600, seed);

  const img = new Image();
  img.onload = () => {
    const el = document.getElementById('modelImg');
    el.src = url;
    el.style.opacity = '0';
    requestAnimationFrame(() => {
      el.style.transition = 'opacity .5s';
      el.style.opacity = '1';
    });
    overlay.classList.remove('show');
  };
  img.onerror = () => {
    overlay.classList.remove('show');
    overlay.querySelector('.overlay-msg').textContent = '⚠️ Tap Remix\nto try again';
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 3000);
  };
  img.src = url;
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  const overlay = document.getElementById('modelOverlay');
  if (overlay) {
    overlay.querySelector('.overlay-msg').textContent = '✨ Updating\nyour look...';
    overlay.classList.add('show');
  }
  debounceTimer = setTimeout(() => loadCharacter('✨ Creating\nnew look...'), 900);
}

function regenNow() {
  remixCounter++;
  loadCharacter('🎲 Remixing\nyour look...');
}

// ============================================================
// CATEGORY PANEL
// ============================================================
function buildPanel() {
  const panel = document.getElementById('catPanel');
  panel.innerHTML = '';
  CAT_META.forEach(({key, label}) => {
    const o = opts(key);
    const cur = o[outfit[key]];
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.id = `row-${key}`;

    const swStyle = cur.color === 'transparent'
      ? 'background:transparent;border-style:dashed'
      : `background:${cur.color}`;

    row.innerHTML = `
      <div class="cat-label">${label}</div>
      <div class="cat-controls">
        <button class="arr" onclick="cycle('${key}',-1)">&#8592;</button>
        <div class="swatch" id="sw-${key}" style="${swStyle}"></div>
        <span class="opt-name" id="on-${key}">${cur.name}</span>
        <button class="arr" onclick="cycle('${key}',1)">&#8594;</button>
      </div>`;
    panel.appendChild(row);
  });
}

function cycle(key, dir) {
  const o = opts(key);
  outfit[key] = (outfit[key] + dir + o.length) % o.length;
  const cur = o[outfit[key]];
  document.getElementById(`on-${key}`).textContent = cur.name;
  const sw = document.getElementById(`sw-${key}`);
  if (cur.color === 'transparent') {
    sw.style.background = 'transparent';
    sw.style.borderStyle = 'dashed';
  } else {
    sw.style.background = cur.color;
    sw.style.borderStyle = 'solid';
  }
  scheduleUpdate();
}

// ============================================================
// PHOTO SCREEN
// ============================================================
function buildBgStrip() {
  const strip = document.getElementById('bgStrip');
  strip.innerHTML = '';
  BACKGROUNDS.forEach((bg, i) => {
    const btn = document.createElement('button');
    btn.className = 'bg-btn' + (i === 0 ? ' active' : '');
    btn.textContent = bg.name;
    btn.onclick = () => applyBg(i);
    strip.appendChild(btn);
  });
}

function applyBg(idx) {
  selectedBg = idx;
  document.querySelectorAll('.bg-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  loadPhotoScene(BACKGROUNDS[idx]);
}

function loadPhotoScene(bg) {
  const overlay = document.getElementById('photoOverlay');
  overlay.querySelector('.overlay-msg').textContent = '🌟 Setting up\nthe scene...';
  overlay.classList.add('show');

  const prompt = buildPhotoPrompt(bg.p);
  const seed = getSeed(selectedBg * 333);
  const url = makeUrl(prompt, 480, 540, seed);

  const img = new Image();
  img.onload = () => {
    const el = document.getElementById('photoImg');
    el.src = url;
    el.style.opacity = '0';
    requestAnimationFrame(() => {
      el.style.transition = 'opacity .5s';
      el.style.opacity = '1';
    });
    overlay.classList.remove('show');
  };
  img.onerror = () => {
    overlay.querySelector('.overlay-msg').textContent = '⚠️ Select a\ndifferent scene';
    setTimeout(() => overlay.classList.remove('show'), 3000);
  };
  img.src = url;
}

function snap() {
  const flash = document.getElementById('flash');
  flash.classList.add('go');
  const frame = document.querySelector('.photo-frame');
  const emojis = ['⭐','✨','💫','🌟','💥','🎉','🎊','💖'];
  for (let i = 0; i < 14; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.style.left = (5 + Math.random() * 88) + '%';
    sp.style.top = (5 + Math.random() * 88) + '%';
    sp.style.animationDelay = (Math.random() * .65) + 's';
    sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    frame.appendChild(sp);
    setTimeout(() => sp.remove(), 1500);
  }
  setTimeout(() => flash.classList.remove('go'), 200);
}

window.addEventListener('load', () => {
  const girlP = 'high quality 2D digital art, traditional hand-drawn animation style, cute expressive chibi girl character, exaggerated charming proportions, bright happy smile, full body, pink dress, long brown hair with bow, white sneakers, plain white background, soft global illumination, cinematic rim lighting, vibrant colors';
  const boyP = 'high quality 2D digital art, traditional hand-drawn animation style, cute expressive chibi boy character, exaggerated charming proportions, bright happy smile, full body, blue t-shirt, dark jeans, white sneakers, short brown hair, plain white background, soft global illumination, cinematic rim lighting, vibrant colors';
  loadPickImg('pickGirlWrap', girlP, 42);
  loadPickImg('pickBoyWrap',  boyP,  77);
});

function loadPickImg(wrapperId, prompt, seed) {
  const url = makeUrl(prompt, 220, 310, seed);
  const img = new Image();
  img.onload = () => {
    const wrap = document.getElementById(wrapperId);
    wrap.innerHTML = '';
    const el = document.createElement('img');
    el.src = url;
    el.style.opacity = '0';
    wrap.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transition = 'opacity .6s';
      el.style.opacity = '1';
    });
  };
  img.src = url;
}
