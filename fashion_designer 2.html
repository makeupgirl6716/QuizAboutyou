<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Fashion Studio ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FF6BB5;--purple:#7C3AED;--purpleD:#5B21B6;
    --yellow:#FBBF24;--text:#2D1654;--textMid:#4C2A85;
    --bg:#F3E8FF;--border:#C4B5FD;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Fredoka',sans-serif;background:var(--bg);overflow-x:hidden;}
  .screen{display:none;}
  .screen.active{display:flex;flex-direction:column;min-height:100vh;}
  #pickScreen{align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;
    background:radial-gradient(ellipse at 30% 20%,#FFE4F5 0%,#EDE9FE 50%,#DBEAFE 100%);}
  .pick-title{font-size:clamp(2rem,6vw,3.2rem);font-weight:700;color:var(--text);margin-bottom:.25rem;}
  .pick-title em{color:#BE185D;font-style:normal;}
  .pick-sub{font-size:1.1rem;color:var(--textMid);font-weight:600;margin-bottom:2rem;}
  .pick-cards{display:flex;gap:1.6rem;flex-wrap:wrap;justify-content:center;}
  .pick-card{background:#fff;border-radius:24px;padding:1.2rem 1rem 1.4rem;
    box-shadow:0 6px 28px rgba(109,40,217,.18);cursor:pointer;width:165px;
    border:3px solid #DDD6FE;transition:transform .22s,border-color .22s,box-shadow .22s;
    display:flex;flex-direction:column;align-items:center;gap:.7rem;}
  .pick-card:hover{transform:translateY(-8px) scale(1.04);border-color:var(--purple);box-shadow:0 16px 40px rgba(109,40,217,.28);}
  .pick-card svg{width:115px;height:168px;filter:drop-shadow(0 4px 8px rgba(109,40,217,.18));}
  .pick-card h2{font-size:1.2rem;font-weight:700;color:var(--text);}
  #studioScreen{background:var(--bg);}
  .s-hdr{background:linear-gradient(135deg,#6D28D9,#BE185D);padding:.8rem 1.1rem;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 4px 16px rgba(109,40,217,.35);gap:.6rem;flex-wrap:wrap;}
  .s-hdr h1{color:#fff;font-size:1.35rem;font-weight:700;white-space:nowrap;}
  .hbtns{display:flex;gap:.5rem;}
  .btn-y{background:var(--yellow);color:#1A0A2E;border:none;border-radius:50px;
    padding:.46rem 1.1rem;font-family:'Fredoka',sans-serif;font-size:.95rem;font-weight:700;
    cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 3px 10px rgba(251,191,36,.4);}
  .btn-y:hover{transform:scale(1.07);}
  .btn-g{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.55);
    border-radius:50px;padding:.42rem .95rem;font-family:'Fredoka',sans-serif;
    font-size:.88rem;font-weight:700;cursor:pointer;transition:background .15s;}
  .btn-g:hover{background:rgba(255,255,255,.35);}
  .s-body{display:flex;flex:1;overflow:hidden;min-height:0;}
  .model-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:1.2rem;background:linear-gradient(160deg,#F5F0FF 0%,#EDE9FE 100%);}
  .model-stage{position:relative;width:200px;height:320px;}
  .model-stage svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 8px 20px rgba(109,40,217,.22));}
  .m-hint{margin-top:.75rem;font-size:.82rem;font-weight:600;color:#3B0764;text-align:center;
    background:rgba(255,255,255,.85);border-radius:20px;padding:.3rem .85rem;border:1.5px solid #C4B5FD;}
  .cat-panel{width:268px;background:#fff;border-left:3px solid #C4B5FD;
    overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.42rem;}
  .cat-panel::-webkit-scrollbar{width:5px;}
  .cat-panel::-webkit-scrollbar-thumb{background:#A78BFA;border-radius:3px;}
  .cat-row{background:#EDE9FE;border-radius:12px;padding:.55rem .75rem;
    border:2px solid #C4B5FD;transition:border-color .15s;}
  .cat-row:hover{border-color:#7C3AED;}
  .cat-lbl{font-size:.73rem;font-weight:700;color:#3B0764;
    text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;}
  .cat-ctrl{display:flex;align-items:center;gap:.4rem;}
  .arr{background:#7C3AED;color:#fff;border:2px solid #5B21B6;border-radius:50%;
    width:30px;height:30px;flex-shrink:0;font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-weight:700;
    transition:background .14s,transform .1s;box-shadow:0 2px 6px rgba(109,40,217,.4);}
  .arr:hover{background:#5B21B6;transform:scale(1.18);}
  .arr:active{transform:scale(.95);}
  .sw{width:20px;height:20px;border-radius:50%;flex-shrink:0;
    border:2.5px solid rgba(0,0,0,.2);box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .on{flex:1;font-size:.9rem;font-weight:700;color:#1E0A3C;
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #photoScreen{align-items:center;padding:1.1rem .9rem;gap:.8rem;
    background:linear-gradient(160deg,#F5F0FF,#EDE9FE);}
  #photoScreen h1{font-size:1.8rem;font-weight:700;color:var(--text);}
  .bg-strip{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center;max-width:500px;}
  .bg-btn{padding:.34rem .82rem;border-radius:50px;border:2.5px solid #7C3AED;
    background:#EDE9FE;color:#3B0764;font-family:'Fredoka',sans-serif;
    font-size:.85rem;font-weight:700;cursor:pointer;transition:all .14s;}
  .bg-btn:hover,.bg-btn.active{background:#7C3AED;color:#fff;border-color:#5B21B6;}
  .photo-frame{position:relative;width:min(380px,92vw);height:min(460px,82vw);
    border-radius:22px;overflow:hidden;box-shadow:0 12px 48px rgba(109,40,217,.3);}
  .photo-bg-layer{position:absolute;inset:0;}
  .photo-bg-layer svg{width:100%;height:100%;}
  .photo-char{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:190px;height:304px;}
  .photo-char svg{width:100%;height:100%;overflow:visible;}
  .p-actions{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;}
  .btn-out{background:#EDE9FE;color:#3B0764;border:2px solid #A78BFA;border-radius:50px;
    padding:.5rem 1.3rem;font-family:'Fredoka',sans-serif;font-size:.95rem;font-weight:700;
    cursor:pointer;transition:background .15s;}
  .btn-out:hover{background:#DDD6FE;}
  .flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:999;transition:opacity .12s;}
  .flash.go{opacity:1;}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1.2) rotate(200deg)}}
  .sp{position:absolute;pointer-events:none;font-size:1.4rem;animation:sparkle .9s ease both;}
  @media(max-width:560px){
    .s-body{flex-direction:column;}
    .cat-panel{width:100%;border-left:none;border-top:3px solid #C4B5FD;max-height:42vh;}
    .model-stage{width:155px;height:248px;}
  }
</style>
</head>

function buildBgStrip(){
  const s=document.getElementById('bgStrip');s.innerHTML='';
  BGS.forEach((bg,i)=>{const btn=document.createElement('button');btn.className='bg-btn'+(i===0?' active':'');btn.textContent=bg.name;btn.onclick=()=>applyBg(i);s.appendChild(btn);});
}
function applyBg(idx){
  selBg=idx;document.querySelectorAll('.bg-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('photoBg').innerHTML=`<svg viewBox="0 0 380 460" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">${BGS[idx].fn()}</svg>`;
}
function snap(){
  const flash=document.getElementById('flash');flash.classList.add('go');
  const frame=document.getElementById('photoFrame');
  const em=['⭐','✨','💫','🌟','💥','🎉','💖'];
  for(let i=0;i<14;i++){const sp=document.createElement('div');sp.className='sp';sp.style.left=(4+Math.random()*88)+'%';sp.style.top=(4+Math.random()*88)+'%';sp.style.animationDelay=(Math.random()*.65)+'s';sp.textContent=em[Math.floor(Math.random()*em.length)];frame.appendChild(sp);setTimeout(()=>sp.remove(),1500);}
  setTimeout(()=>flash.classList.remove('go'),220);
}
</script>
