// Fisher-Yates shuffle — returns new shuffled array
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Pre-shuffle all questions for the current quiz attempt
// Each shuffledQ = { t, displayOpts:[{text, resultIdx}] }
function buildShuffledQuestions(qz){
  return qz.qs.map(q=>{
    const indexed=q.o.map((text,idx)=>({text,resultIdx:idx}));
    const shuffled=shuffle(indexed);
    return{t:q.t,displayOpts:shuffled};
  });
}

// State: shuffledQs holds the pre-shuffled questions for the current quiz attempt
let S={screen:"home",quiz:null,q:0,shuffledQs:[],votes:[],result:null};

const sessionPlays={};

async function loadStats(){try{const r=await window.storage.get("quizStatsV12",true);return r?JSON.parse(r.value):{};}catch(e){return {};}}
async function saveStats(s){try{await window.storage.set("quizStatsV12",JSON.stringify(s),true);}catch(e){}}
async function logPlay(id){sessionPlays[id]=(sessionPlays[id]||0)+1;const st=await loadStats();if(!st[id])st[id]={plays:0,repeats:0};st[id].plays++;if(sessionPlays[id]>1)st[id].repeats++;await saveStats(st);}

// Tally: votes is an array of resultIdx values (one per question)
function tallyVotes(qz,votes){
  const v=new Array(qz.res.length).fill(0);
  votes.forEach(idx=>{if(idx>=0&&idx<v.length)v[idx]++;});
  return v.indexOf(Math.max(...v));
}

function render(){
  const app=document.getElementById("app");
  if(S.screen==="home")app.innerHTML=homeHTML();
  else if(S.screen==="quiz")app.innerHTML=quizHTML();
  else if(S.screen==="loading")app.innerHTML=loadHTML();
  else if(S.screen==="result")app.innerHTML=resHTML();
  else if(S.screen==="dash"){renderDash();return;}
  bind();
}

const LM=["Thinking really hard...","Checking the results...","Almost there...","Finding your perfect match...","Just a few more seconds...","Getting your result ready..."];

async function renderDash(){
  const app=document.getElementById("app");
  app.innerHTML=`<div style="max-width:680px;margin:0 auto;animation:fadeUp .4s ease">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
      <div><h2 style="font-family:${F};font-weight:700;font-size:2rem;color:#fff;text-shadow:2px 3px 0 rgba(0,0,0,.15)">Quiz Analytics</h2><p style="color:rgba(255,255,255,.85);font-size:1rem;font-weight:600">Live usage across all players</p></div>
      <button id="dbk" style="background:rgba(255,255,255,.88);border:none;border-radius:14px;padding:10px 22px;cursor:pointer;font-size:1.05rem;color:#555;font-family:${F};font-weight:600;box-shadow:0 3px 12px rgba(0,0,0,.1)">Back</button>
    </div>
    <div id="dc" style="color:#fff;font-family:${F};font-size:1.1rem">Loading stats...</div>
  </div>`;
  document.getElementById("dbk").addEventListener("click",()=>{S.screen="home";render();});
  const stats=await loadStats();
  const ids=QZ.map(q=>q.id);
  const totalPlays=ids.reduce((s,id)=>s+(stats[id]?.plays||0),0);
  const totalRepeats=ids.reduce((s,id)=>s+(stats[id]?.repeats||0),0);
  const sorted=[...QZ].sort((a,b)=>(stats[b.id]?.plays||0)-(stats[a.id]?.plays||0));
  const maxP=Math.max(...ids.map(id=>stats[id]?.plays||0),1);
  document.getElementById("dc").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px">
      <div style="background:rgba(255,255,255,.18);border-radius:18px;padding:18px 14px;text-align:center;border:2px solid rgba(255,255,255,.28)"><div style="font-size:2.4rem;font-weight:700">${totalPlays}</div><div style="font-size:.9rem;color:rgba(255,255,255,.8);margin-top:3px">Total Plays</div></div>
      <div style="background:rgba(255,255,255,.18);border-radius:18px;padding:18px 14px;text-align:center;border:2px solid rgba(255,255,255,.28)"><div style="font-size:2.4rem;font-weight:700">${totalRepeats}</div><div style="font-size:.9rem;color:rgba(255,255,255,.8);margin-top:3px">Repeat Plays</div></div>
      <div style="background:rgba(255,255,255,.18);border-radius:18px;padding:18px 14px;text-align:center;border:2px solid rgba(255,255,255,.28)"><div style="font-size:.95rem;font-weight:700;margin-top:6px;line-height:1.3">${totalPlays>0?sorted[0].title:"No data yet"}</div><div style="font-size:.9rem;color:rgba(255,255,255,.8);margin-top:3px">Most Popular</div></div>
    </div>
    <div style="background:rgba(255,255,255,.14);border-radius:18px;padding:20px 18px;border:2px solid rgba(255,255,255,.22)">
      <div style="font-size:.75rem;color:rgba(255,255,255,.7);letter-spacing:2px;font-weight:700;margin-bottom:16px">PLAYS PER QUIZ</div>
      ${sorted.map(q=>{const plays=stats[q.id]?.plays||0,rep=stats[q.id]?.repeats||0;const pct=Math.round((plays/maxP)*100);return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:1rem;font-weight:600">${q.title}</span><span style="font-size:.88rem;color:rgba(255,255,255,.8);margin-left:8px;white-space:nowrap">${plays} plays — ${rep} repeats</span></div><div style="height:20px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${q.hdr};border-radius:99px;transition:width .8s;min-width:${plays>0?"8px":"0"}"></div></div></div>`;}).join("")}
      ${totalPlays===0?`<div style="text-align:center;color:rgba(255,255,255,.55);padding:20px 0">No plays recorded yet!</div>`:""}
    </div>`;
}

let lmi=null;
function startLoad(){let i=0;lmi=setInterval(()=>{i=(i+1)%LM.length;const el=document.getElementById("lm");if(el)el.textContent=LM[i];},1600);}

async function getResult(){
  const qz=S.quiz;
  const wi=tallyVotes(qz,S.votes);
  const wn=qz.res[wi];
  // Build a readable answer list using the original question text + chosen answer text
  const qa=S.shuffledQs.map((sq,i)=>{
    const chosen=sq.displayOpts.find(o=>o.resultIdx===S.votes[i]);
    return`Q: ${sq.t}\nA: ${chosen?chosen.text:"(no answer)"}`;
  }).join("\n\n");
  await logPlay(qz.id);
  if(qz.id==="number"){if(lmi)clearInterval(lmi);S.result={name:wn,desc:NUM_DESC[wn]};S.screen="result";render();return;}
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:`You are a fun quiz host for 3rd graders age 8-9. The quiz is "${qz.title}" and this child's result is: ${wn}\n\nTheir answers:\n${qa}\n\nWrite exactly 3 short enthusiastic sentences for a 3rd grader explaining why they are ${wn}. Mention one or two of their specific answers. Use simple words and be very positive. No emoji at all.\n\nReply with ONLY the 3 sentences, nothing else.`}]})});
    const data=await res.json();
    if(lmi)clearInterval(lmi);S.result={name:wn,desc:data.content[0].text.trim()};S.screen="result";render();
  }catch(e){
    if(lmi)clearInterval(lmi);
    const fb={color:`You are ${wn} through and through! Your answers show a personality that is bold, bright, and full of life just like this amazing color. Keep shining and being your wonderful self!`,disney:`You are ${wn}! Everything about your answers shows you have the heart, spirit, and courage of this legendary character. Keep being the incredible person you already are!`,princess:`You are ${wn}! Your answers prove you have the bravery, grace, and heart of this amazing princess. You were absolutely born to be this wonderful!`,animal:`You are a ${wn}! Your answers show you have all the incredible qualities of this powerful animal. Keep being your strong, unique, and awesome self!`,food:`You are ${wn}! Your personality is a perfect match for this beloved favorite. Everyone loves you just as much as they love this amazing treat!`,celeb:`You are ${wn}! Your talent, energy, and heart all line up perfectly with this incredible star. Get ready because your spotlight moment is coming soon!`,hero:`You are ${wn}! Your answers prove you have the powers, the values, and the heroic spirit of this legendary hero. The world needs people exactly like you!`,number:`You are a ${wn}! Your answers show your amazing personality in the most perfect way. Keep being the absolutely incredible person that you truly are!`};
    S.result={name:wn,desc:fb[qz.id]||`You are ${wn} and it suits you perfectly!`};S.screen="result";render();
  }
}

function bind(){
  document.querySelectorAll(".qb").forEach(b=>b.addEventListener("click",()=>{
    const qz=QZ.find(q=>q.id===b.dataset.id);
    S={screen:"quiz",quiz:qz,q:0,shuffledQs:buildShuffledQuestions(qz),votes:[],result:null};
    render();
  }));
  document.querySelectorAll(".ab").forEach(b=>b.addEventListener("click",()=>{
    const resultIdx=parseInt(b.dataset.ridx);
    S.votes=[...S.votes,resultIdx];
    if(S.q<S.quiz.qs.length-1){S.q++;render();}
    else{S.screen="loading";render();startLoad();getResult();}
  }));
  const bk=document.getElementById("bk");if(bk)bk.addEventListener("click",()=>{S.screen="home";render();});
  const hb=document.getElementById("hb");if(hb){hb.addEventListener("click",()=>{S.screen="home";render();});hb.addEventListener("mouseover",()=>{hb.style.transform="translateY(-4px) scale(1.04)";});hb.addEventListener("mouseout",()=>{hb.style.transform="none";});}
  const tt=document.getElementById("ttap");if(tt){tt.addEventListener("click",()=>{titleTaps++;clearTimeout(tapTimer);if(titleTaps>=5){titleTaps=0;S.screen="dash";render();}else tapTimer=setTimeout(()=>{titleTaps=0;},2000);});}
}
render();
</script>
